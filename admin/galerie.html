<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Galerie - Manar Sport</title>

    <script src="../assets/js/sync.js"></script>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); color: white; padding: 30px 0; }
        .main-content { flex: 1; padding: 30px; background: #f8fafc; }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .gallery-item {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        
        .gallery-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        
        .gallery-actions {
            position: absolute;
            top: 5px;
            right: 5px;
            display: flex;
            gap: 5px;
        }
        
        .gallery-actions button {
            padding: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-running"></i>
                <h2>MANAR SPORT</h2>
                <p>Administration</p>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="utilisateurs.html">Utilisateurs</a></li>
                <li><a href="evenements.html">?v?nements</a></li>
                <li><a href="galerie.html" class="active">Galerie</a></li>
                <li><a href="../index.html">Retour au site</a></li>
            </ul>
        </aside>
        
        <main class="main-content">
            <h1>Gestion de la Galerie</h1>
            
            <button class="btn-add" onclick="uploadPhoto()">
                <i class="fas fa-upload"></i> Uploader une photo
            </button>
            
            <div class="gallery-grid">
                <!-- Exemples -->
                <div class="gallery-item">
                    <img src="../assets/images/placeholder.jpg" alt="Photo 1">
                    <div class="gallery-actions">
                        <button onclick="editPhoto(1)">?o??</button>
                        <button onclick="deletePhoto(1)">?Y-'?</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const session = localStorage.getItem('currentSession');
            if (!session || JSON.parse(session).role !== 'admin') {
                window.location.href = '../pages/connexion.html';
                return;
            }
        });
        
        function uploadPhoto() {
            alert('Upload de photo (simulation)');
        }
        
        function editPhoto(id) {
            alert('Modifier photo ' + id);
        }
        
        function deletePhoto(id) {
            if (confirm('Supprimer cette photo ?')) {
                alert('Photo supprim?e');
            }
        }
    </script>
</body>
</html>
