<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Utilisateurs - Manar Sport</title>

    <script src="../assets/js/sync.js"></script>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* M?mes styles que dashboard.html */
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); color: white; padding: 30px 0; }
        .main-content { flex: 1; padding: 30px; background: #f8fafc; }
        
        .users-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
        }
        
        .users-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .users-table th {
            background: #f8fafc;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
        }
        
        .users-table td {
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .users-table tr:hover {
            background: #f8fafc;
        }
        
        .btn-action {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 5px;
        }
        
        .btn-edit { background: #667eea; color: white; }
        .btn-delete { background: #dc2626; color: white; }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-running" style="font-size: 40px;"></i>
                <h2>MANAR SPORT</h2>
                <p>Administration</p>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="utilisateurs.html" class="active">Utilisateurs</a></li>
                <li><a href="evenements.html">?v?nements</a></li>
                <li><a href="galerie.html">Galerie</a></li>
                <li><a href="../index.html">Retour au site</a></li>
            </ul>
        </aside>
        
        <main class="main-content">
            <h1>Gestion des Utilisateurs</h1>
            
            <div class="users-table">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Pr?nom</th>
                            <th>Email</th>
                            <th>R?le</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Rempli par JavaScript -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const session = localStorage.getItem('currentSession');
            if (!session || JSON.parse(session).role !== 'admin') {
                window.location.href = '../pages/connexion.html';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const tbody = document.getElementById('usersTableBody');
            
            users.forEach(user => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.nom || '-'}</td>
                    <td>${user.prenom || '-'}</td>
                    <td>${user.email}</td>
                    <td>${user.role || 'membre'}</td>
                    <td>
                        <button class="btn-action btn-edit" onclick="editUser(${user.id})">Modifier</button>
                        <button class="btn-action btn-delete" onclick="deleteUser(${user.id})">Supprimer</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        });
        
        function editUser(id) {
            alert('Modification utilisateur ' + id + ' (simulation)');
        }
        
        function deleteUser(id) {
            if (confirm('Supprimer cet utilisateur ?')) {
                alert('Utilisateur supprim? (simulation)');
            }
        }
    </script>
</body>
</html>
